<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator - Ashutosh Sharma</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Name Header -->
  <div class="header-name">
      <h1>Ashutosh Sharma</h1>
      <p>Scientific Calculator</p>
  </div>

  <div class="calculator">

    <!-- ── DISPLAY ── -->
    <div class="screen">
      <div class="expression" id="expression"></div>
      <div class="display" id="display">0</div>
    </div>

    <!-- ── MODE TOGGLES ── -->
    <div class="mode-row">
      <button class="mode-btn active" id="btnDeg" onclick="setMode('deg')">DEG</button>
      <button class="mode-btn" id="btnRad" onclick="setMode('rad')">RAD</button>
      <button class="mode-btn" id="btnInv" onclick="toggleInv()">INV</button>
    </div>

    <!-- ── BUTTON GRID ── -->
    <div class="grid">

      <!-- Row 1 -->
      <button class="btn clr" onclick="act('AC')">AC</button>
      <button class="btn num" onclick="act('(')">(</button>
      <button class="btn num" onclick="act(')')">)</button>
      <button class="btn op" onclick="act('%')">%</button>
      <button class="btn op" onclick="act('÷')">÷</button>

      <!-- Row 2 -->
      <button class="btn num" onclick="act('7')">7</button>
      <button class="btn num" onclick="act('8')">8</button>
      <button class="btn num" onclick="act('9')">9</button>
      <button class="btn op" onclick="act('×')">×</button>
      <button class="btn sci" id="btn-sqrt" onclick="act('√')">√</button>

      <!-- Row 3 -->
      <button class="btn num" onclick="act('4')">4</button>
      <button class="btn num" onclick="act('5')">5</button>
      <button class="btn num" onclick="act('6')">6</button>
      <button class="btn op" onclick="act('−')">−</button>
      <button class="btn sci" id="btn-sq" onclick="act('x²')">x²</button>

      <!-- Row 4 -->
      <button class="btn num" onclick="act('1')">1</button>
      <button class="btn num" onclick="act('2')">2</button>
      <button class="btn num" onclick="act('3')">3</button>
      <button class="btn op" onclick="act('+')">+</button>
      <button class="btn sci" id="btn-log" onclick="act('log')">log</button>

      <!-- Row 5 -->
      <button class="btn num zero" onclick="act('0')">0</button>
      <button class="btn num" onclick="act('.')">.</button>
      <button class="btn eq" onclick="act('=')">=</button>
      <button class="btn sci" id="btn-ln" onclick="act('ln')">ln</button>

      <!-- Row 6 -->
      <button class="btn sci" id="btn-sin" onclick="act('sin')">sin</button>
      <button class="btn sci" id="btn-cos" onclick="act('cos')">cos</button>
      <button class="btn sci" id="btn-tan" onclick="act('tan')">tan</button>
      <button class="btn sci" onclick="act('π')">π</button>
      <button class="btn sci" onclick="act('MC')">MC</button>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
